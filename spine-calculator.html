<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spine Width Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a253e;
    --paper: #eff5f6;
    --cream: #daedf0;
    --rule: #b8cdd1;
    --accent: #c8401a;
    --accent2: #2a6e4e;
    --muted: #4a6a75;
    --highlight: #daedf0;
    --card: #ffffff;
    --shadow: 0 2px 12px rgba(10,37,62,0.10);
    --shadow-lg: 0 8px 40px rgba(10,37,62,0.16);
    --radius: 3px;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #eff5f6;
    color: var(--ink);
    font-family: var(--mono);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: #0a253e;
    color: var(--paper);
    padding: 16px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    border-bottom: none;
  }
  header .logo {
    font-family: var(--sans);
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 10px;
  }
  header .logo span { color: var(--accent); }
  header .tagline {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .btn-manage {
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    color: var(--paper);
    border: 1.5px solid rgba(245,242,236,0.35);
    padding: 8px 18px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.18s;
    display: flex; align-items: center; gap: 7px;
  }
  .btn-manage:hover {
    background: #37bcd2;
    border-color: #37bcd2;
    color: white;
  }
  .btn-manage svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ─── MAIN ─── */
  main {
    max-width: 780px;
    margin: 48px auto;
    padding: 0 24px;
  }

  /* ─── CALCULATOR CARD ─── */
  .calc-card {
    background: var(--card);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .calc-card-header {
    background: var(--cream);
    border-bottom: 1.5px solid var(--rule);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 10px;
  }
  .calc-card-header .label {
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: #0a253e;
  }
  .calc-card-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #37bcd2;
  }
  .calc-body { padding: 32px 28px; }

  /* ─── INPUTS ─── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }
  @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 700;
  }
  .field input[type="number"],
  .field select {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--ink);
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus,
  .field select:focus {
    border-color: var(--ink);
    background: white;
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 0.9rem;
  }

  /* ─── FILTERS ─── */
  .filter-bar {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 14px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding-top: 10px;
    padding-bottom: 10px;
    border-top: 1px solid var(--rule);
  }
  .filter-row:first-child {
    border-top: none;
    padding-top: 0;
  }
  .filter-group-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 700;
    white-space: nowrap;
    min-width: 36px;
    margin-right: 2px;
  }
  .filter-chip {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 3px 9px;
    border: 1.5px solid var(--rule);
    border-radius: 20px;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .filter-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .filter-chip:hover:not(.active) {
    border-color: var(--ink);
  }

  /* ─── RESULT ─── */
  .result-section {
    background: #0a253e;
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-top: 4px;
  }

  .result-main {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
  }
  .result-value {
    font-family: var(--mono);
    font-size: 4rem;
    font-weight: 500;
    color: var(--paper);
    line-height: 1;
    letter-spacing: -0.02em;
    transition: all 0.2s;
  }
  .result-unit {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 400;
    color: rgba(245,242,236,0.7);
  }
  .result-conversions {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .conv-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .conv-label {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,242,236,0.35);
  }
  .conv-val {
    font-size: 1.05rem;
    color: rgba(245,242,236,0.8);
    font-weight: 500;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    padding: 20px 0 4px;
    font-style: italic;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,37,62,0.65);
    z-index: 100;
    backdrop-filter: blur(2px);
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 720px;
    border: 1.5px solid var(--rule);
    box-shadow: var(--shadow-lg);
    animation: slideIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
    overflow: hidden;
    position: relative;
  }
  @keyframes slideIn {
    from { transform: translateY(-24px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
  .modal-header {
    background: #0a253e;
    color: var(--paper);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #37bcd2;
  }
  .modal-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: #ffffff;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--paper);
    cursor: pointer;
    font-size: 1.3rem;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 2px;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .modal-close:hover { opacity: 1; }

  /* ─── STOCK LIST ─── */
  .stock-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 4px;
    margin-bottom: 20px;
    background: #ffffff;
  }
  .stock-list::-webkit-scrollbar { width: 4px; }
  .stock-list::-webkit-scrollbar-track { background: #daedf0; }
  .stock-list::-webkit-scrollbar-thumb { background: #b8cdd1; border-radius: 4px; }

  .modal-body { padding: 24px; background: #ffffff; }

  .stock-item {
    border: 1.5px solid #b8cdd1;
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.15s;
    background: #ffffff;
  }
  .stock-item:hover { border-color: #0a253e; }

  .stock-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    background: #daedf0 !important;
    gap: 12px;
    min-height: 48px;
  }
  .stock-item-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }



  .stock-name {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 0.88rem;
    color: #0f0e0c !important;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
  }
  .stock-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #4a7a8a !important;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .stock-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-icon {
    background: #ffffff;
    border: 1.5px solid #b8cdd1;
    border-radius: 3px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 0.72rem;
    color: #0a253e;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .btn-icon:hover { border-color: #0a253e; background: #0a253e; color: #e9fcff; }
  .btn-icon.danger:hover { border-color: #c8401a; background: #c8401a; color: white; }

  /* ─── EDIT FORM ─── */
  .stock-edit-form {
    padding: 14px 14px 10px;
    border-top: 1px solid var(--rule);
    background: white;
    display: none;
  }
  .stock-edit-form.open { display: block; }
  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 80px 80px 100px;
    gap: 10px;
    align-items: end;
    margin-bottom: 10px;
  }
  @media (max-width: 560px) { .edit-grid { grid-template-columns: 1fr 1fr; } }

  .edit-field { display: flex; flex-direction: column; gap: 4px; }
  .edit-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 700;
  }
  .edit-input {
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 6px 9px;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    background: var(--paper);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .edit-input:focus { border-color: var(--ink); background: white; }
  .edit-check-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
  }
  .edit-check-row input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent2); cursor: pointer;
  }
  .edit-check-row label { font-size: 0.8rem; cursor: pointer; }

  .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-save {
    font-family: var(--sans); font-weight: 700; font-size: 0.72rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--accent2); color: white;
    border: none; border-radius: var(--radius);
    padding: 7px 16px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    font-family: var(--sans); font-weight: 700; font-size: 0.72rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: transparent; color: var(--muted);
    border: 1.5px solid var(--rule); border-radius: var(--radius);
    padding: 7px 14px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

  /* ─── ADD STOCK ─── */
  .modal-add-section {
    background: var(--cream);
    border: 1.5px dashed var(--rule);
    border-radius: var(--radius);
    padding: 20px;
  }
  .modal-add-title {
    font-family: var(--sans); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  /* ─── NO STOCK MSG ─── */
  .no-stock-msg {
    background: var(--highlight);
    border: 1.5px solid #f0d84a;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 0.78rem;
    color: #7a6600;
    display: none;
    margin-bottom: 14px;
    font-family: var(--sans);
  }
</style>
</head>

<main>
  <div class="calc-card">
    <div class="calc-card-header">
      <div class="dot"></div>
      <div class="label">Spine Width Calculator</div>
    </div>
    <div class="calc-body">

      <div class="no-stock-msg" id="noStockMsg">
        ⚠ No paper stocks found. Open <strong>Manage Stocks</strong> to add some.
      </div>

      <div class="form-row">
        <div class="field">
          <label>Number of Pages</label>
          <input type="number" id="pageCount" min="1" placeholder="e.g. 320" oninput="calculate()">
          <label style="margin-top:14px;">Select Paper Stock</label>
          <div class="select-wrap">
            <select id="stockSelect" onchange="calculate()">
              <option value="">— Select a paper stock —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Filter Stocks</label>
          <div id="filterBar"></div>
        </div>
      </div>

      <div id="resultSection">
        <div class="empty-state">Enter page count and select a stock to calculate.</div>
      </div>

    </div>
  </div>
</main>

<!-- ─── MODAL ─── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Manage Paper Stocks</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="stock-list" id="stockList"></div>

      <div class="modal-add-section">
        <div class="modal-add-title">+ Add New Stock</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 80px 110px;gap:10px;margin-bottom:12px;align-items:end;">
          <div class="edit-field">
            <div class="edit-label">Brand</div>
            <input class="edit-input" id="newBrand" placeholder="e.g. Sumo">
          </div>
          <div class="edit-field">
            <div class="edit-label">Type <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;">(optional)</span></div>
            <input class="edit-input" id="newType" placeholder="e.g. Offset">
          </div>
          <div class="edit-field">
            <div class="edit-label">GSM</div>
            <input class="edit-input" id="newGsm" type="number" placeholder="100">
          </div>
          <div class="edit-field">
            <div class="edit-label">Thickness (mm/sh)</div>
            <input class="edit-input" id="newThickness" type="number" step="0.0001" placeholder="0.1000">

        <div style="display:flex;align-items:center;justify-content:space-between;">

            <input type="checkbox" id="newCoated">

          <button class="btn-save" onclick="addStock()">Add Stock</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'spinecalc_stocks_v4';

const DEFAULT_STOCKS = [
  { id: 1, brand: "ALO", type: "(WFD indent)", gsm: 100.0, thickness: 0.124, coated: false },
  { id: 2, brand: "ALO", type: "", gsm: 180.0, thickness: 0.18, coated: false },

  { id: 23, brand: "Polar Offset", type: "< 164pp", gsm: 100.0, thickness: 0.118, coated: false },
  { id: 24, brand: "Polar Offset", type: "> 164pp", gsm: 100.0, thickness: 0.12, coated: false },
  { id: 25, brand: "Polar Offset", type: "", gsm: 120.0, thickness: 0.153, coated: false },
  { id: 26, brand: "Sovereign", type: "Offset Indigo digital", gsm: null, thickness: 0.174, coated: false },
  { id: 27, brand: "Sovereign", type: "Offset", gsm: 115.0, thickness: 0.138, coated: false },
  { id: 28, brand: "Sumo", type: "", gsm: 120.0, thickness: 0.138, coated: false },

  { id: 41, brand: "Xper", type: "", gsm: 140.0, thickness: 0.148, coated: false }
];

let stocks = [];
let nextId = 200;
let activeFilters = { brand: 'all', type: 'all', gsm: 'all' };

async function loadStocks() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      stocks = JSON.parse(result.value);
    } else {
      stocks = DEFAULT_STOCKS.map(s => ({...s}));
      await saveStocks();
    }
    nextId = stocks.reduce((m,s) => Math.max(m, s.id), 0) + 1;
  } catch(e) {
    stocks = DEFAULT_STOCKS.map(s => ({...s}));
  }
}

async function saveStocks() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(stocks), true);
  } catch(e) {
    console.error('Storage save failed:', e);
  }
}

// ─── FILTERS ─────────────────────────────────────────────────────────
function getFilteredStocks() {
  return stocks.filter(s => {
    const brandOk = activeFilters.brand === 'all' || s.brand === activeFilters.brand;
    const typeOk  = activeFilters.type  === 'all'
      || (activeFilters.type === 'coated' && s.coated)
      || (activeFilters.type === 'uncoated' && !s.coated);
    const gsmOk   = activeFilters.gsm === 'all' || String(s.gsm) === String(activeFilters.gsm);
    return brandOk && typeOk && gsmOk;
  });
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  const brands = [...new Set(stocks.map(s => s.brand))].filter(Boolean).sort();
  const gsms   = [...new Set(stocks.map(s => s.gsm).filter(g => g !== null && g !== undefined && g !== ''))].sort((a,b) => a - b);

  const chip = (key, val, label) => {
    const active = String(activeFilters[key]) === String(val) ? ' active' : '';
    return `<button class="filter-chip${active}" onclick="setFilter('${key}','${val}')">${label}</button>`;
  };

  let html = '';

  // Type row
  html += `<div class="filter-row">`;
  html += `<span class="filter-group-label">Type</span>`;
  html += chip('type','all','All');
  html += chip('type','coated','Coated');
  html += chip('type','uncoated','Uncoated');
  html += `</div>`;

  // Brand row
  html += `<div class="filter-row">`;
  html += `<span class="filter-group-label">Brand</span>`;
  html += chip('brand','all','All');
  brands.forEach(b => { html += chip('brand', b, b); });
  html += `</div>`;

  // GSM row
  html += `<div class="filter-row">`;
  html += `<span class="filter-group-label">GSM</span>`;
  html += chip('gsm','all','All');
  gsms.forEach(g => { html += chip('gsm', g, g+'gsm'); });
  html += `</div>`;

  bar.innerHTML = html;
}

function setFilter(key, val) {
  if (String(activeFilters[key]) === String(val) && val !== 'all') val = 'all';
  activeFilters[key] = String(val);
  buildFilterBar();
  populateSelect();
  calculate();
}

// ─── SELECT ───────────────────────────────────────────────────────────
function populateSelect() {
  const sel = document.getElementById('stockSelect');
  const prev = sel.value;
  const filtered = getFilteredStocks().sort((a,b)=>{
    if (a.brand < b.brand) return -1;
    if (a.brand > b.brand) return 1;
    return a.gsm - b.gsm;
  });

  sel.innerHTML = '<option value="">— Select a paper stock —</option>';
  filtered.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${stockDisplayName(s)} · ${s.thickness.toFixed(4)}mm/sh`;
    if (String(s.id) === prev) opt.selected = true;
    sel.appendChild(opt);
  });

  // Show warning if no stocks
  document.getElementById('noStockMsg').style.display = stocks.length === 0 ? 'block' : 'none';
}

// ─── DISPLAY NAME ────────────────────────────────────────────────────
function stockDisplayName(s) {
  const namePart = s.type ? `${s.brand} ${s.type}` : s.brand;
  return `${namePart} • ${s.gsm}g • ${s.coated ? 'Coated' : 'Uncoated'}`;
}

// ─── CALCULATE ────────────────────────────────────────────────────────
function calculate() {
  const pages = parseInt(document.getElementById('pageCount').value) || 0;
  const selId = document.getElementById('stockSelect').value;
  const stock = stocks.find(s => String(s.id) === String(selId));
  const res = document.getElementById('resultSection');

  if (!pages || !stock) {
    res.innerHTML = `<div class="empty-state">Enter page count and select a stock to calculate.</div>`;
    return;
  }

  // 1 sheet = 2 pages, so sheets = pages / 2
  const sheets = pages / 2;
  const mm = (sheets * stock.thickness).toFixed(2);
  const mmNum = parseFloat(mm);
  const cm = (mmNum / 10).toFixed(3);
  const inch = (mmNum / 25.4).toFixed(4);
  const maxBar = 300;
  const pct = Math.min((mmNum / maxBar) * 100, 100);

  // Wiro wire size (mm)
  let wireSize;
  if      (mmNum >= 23)  wireSize = 31.8;
  else if (mmNum >= 20)  wireSize = 25.4;
  else if (mmNum >= 17)  wireSize = 22.3;
  else if (mmNum >= 15)  wireSize = 19;
  else if (mmNum >= 13)  wireSize = 15.8;
  else if (mmNum >= 11)  wireSize = 14.3;
  else if (mmNum >= 10)  wireSize = 12.7;
  else if (mmNum >= 8)   wireSize = 11;
  else if (mmNum >= 6)   wireSize = 9.5;
  else if (mmNum >= 4)   wireSize = 7.9;
  else                   wireSize = 6.4;

  // Wire pitch
  const wirePitch = wireSize <= 14.3 ? '3:1' : '2:1';

  res.innerHTML = `
    <div class="result-section">
      <div style="font-family:'Syne',sans-serif;font-size:0.76rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#37bcd2;margin-bottom:10px;">Spine Width</div>
      <div class="result-main">
        <div class="result-value">${mm}</div>
        <div class="result-unit">mm</div>
      </div>
      <div class="result-conversions">
        <div class="conv-item">
          <div class="conv-label">Stock</div>
          <div class="conv-val">${stockDisplayName(stock)}</div>
        </div>
        <div class="conv-item">
          <div class="conv-label">Pages / Sheets</div>
          <div class="conv-val">${pages.toLocaleString()} pp / ${sheets.toLocaleString()} sh</div>
        </div>
      </div>


      <div style="margin-top:20px;padding-top:18px;border-top:1px solid rgba(245,242,236,0.15);">
        <div style="font-family:'Syne',sans-serif;font-size:0.76rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#37bcd2;margin-bottom:14px;">Wiro Binding Size</div>
        <div style="display:flex;gap:32px;flex-wrap:wrap;">
          <div class="conv-item">
            <div class="conv-label">Wire Size</div>
            <div class="conv-val" style="font-size:1.3rem;">${wireSize} mm</div>
          </div>
          <div class="conv-item">
            <div class="conv-label">Wire Pitch</div>
            <div class="conv-val" style="font-size:1.3rem;">${wirePitch}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ─── MODAL ────────────────────────────────────────────────────────────
function openModal() {
  renderStockList();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  buildFilterBar();
  populateSelect();
  calculate();
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ─── STOCK LIST ───────────────────────────────────────────────────────
function renderStockList() {
  const list = document.getElementById('stockList');
  if (stocks.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:24px 0;">No stocks yet. Add one below.</div>';
    return;
  }
  const sorted = [...stocks].sort((a,b) => {
    if (a.brand < b.brand) return -1;
    if (a.brand > b.brand) return 1;
    return a.gsm - b.gsm;
  });
  list.innerHTML = sorted.map(s => `
    <div id="stock-item-${s.id}" style="border:1.5px solid #b8cdd1;border-radius:3px;overflow:visible;background:#ffffff;margin-bottom:2px;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#daedf0;gap:12px;height:auto;min-height:52px;box-sizing:border-box;">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;flex-wrap:nowrap;">
          <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#0a253e;white-space:nowrap;">${escHtml(stockDisplayName(s))}</span>
          <span style="font-family:'DM Mono',monospace;font-size:12px;color:#4a6a75;white-space:nowrap;">${s.thickness.toFixed(4)} mm/sh</span>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button onclick="toggleEdit(${s.id})" style="font-family:'DM Mono',monospace;font-size:12px;color:#0a253e;background:#ffffff;border:1.5px solid #b8cdd1;border-radius:3px;padding:6px 12px;cursor:pointer;white-space:nowrap;">Edit</button>
          <button id="del-btn-${s.id}" onclick="confirmDelete(${s.id})" style="font-family:'DM Mono',monospace;font-size:12px;color:#0a253e;background:#ffffff;border:1.5px solid #b8cdd1;border-radius:3px;padding:6px 12px;cursor:pointer;">✕</button>
        </div>
      </div>
      <div id="edit-form-${s.id}" style="display:none;padding:16px 14px 12px;border-top:1px solid #b8cdd1;background:#ffffff;">
        <div style="display:grid;grid-template-columns:1fr 1fr 80px 110px 110px;gap:10px;margin-bottom:12px;align-items:end;">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a6a75;">Brand</div>
            <input class="edit-input" id="edit-brand-${s.id}" value="${escHtml(s.brand)}">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a6a75;">Type <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></div>
            <input class="edit-input" id="edit-type-${s.id}" value="${escHtml(s.type || '')}" placeholder="e.g. Offset">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a6a75;">GSM</div>
            <input class="edit-input" id="edit-gsm-${s.id}" type="number" value="${s.gsm}">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a6a75;">Thickness (mm/sh)</div>
            <input class="edit-input" id="edit-thick-${s.id}" type="number" step="0.0001" value="${s.thickness}">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a6a75;">&nbsp;</div>
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0;">
              <input type="checkbox" id="edit-coated-${s.id}" ${s.coated ? 'checked' : ''} style="width:15px;height:15px;cursor:pointer;accent-color:#2a6e4e;">
              <label for="edit-coated-${s.id}" style="font-family:'DM Mono',monospace;font-size:13px;color:#0a253e;cursor:pointer;">Coated</label>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-cancel" onclick="toggleEdit(${s.id})">Cancel</button>
          <button class="btn-save" onclick="saveEdit(${s.id})">Save Changes</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleEdit(id) {
  const form = document.getElementById(`edit-form-${id}`);
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}

async function saveEdit(id) {
  const idx = stocks.findIndex(s => s.id === id);
  if (idx === -1) return;
  const brand  = document.getElementById(`edit-brand-${id}`).value.trim();
  const type   = document.getElementById(`edit-type-${id}`).value.trim();
  const gsm    = parseFloat(document.getElementById(`edit-gsm-${id}`).value);
  const thick  = parseFloat(document.getElementById(`edit-thick-${id}`).value);
  const coated = document.getElementById(`edit-coated-${id}`).checked;
  if (!brand || !gsm || !thick) { alert('Please fill in Brand, GSM and Thickness.'); return; }
  stocks[idx] = { ...stocks[idx], brand, type, gsm, thickness: thick, coated };
  await saveStocks();
  renderStockList();
}

function confirmDelete(id) {
  const btn = document.getElementById(`del-btn-${id}`);
  if (!btn) return;
  // First click: turn button into "Sure?" state
  if (btn.dataset.confirming !== 'true') {
    btn.dataset.confirming = 'true';
    btn.textContent = 'Sure?';
    btn.style.background = '#c8401a';
    btn.style.color = '#ffffff';
    btn.style.borderColor = '#c8401a';
    // Auto-reset after 3 seconds if not clicked again
    setTimeout(() => {
      if (btn && btn.dataset.confirming === 'true') {
        btn.dataset.confirming = 'false';
        btn.textContent = '✕';
        btn.style.background = '#ffffff';
        btn.style.color = '#0a253e';
        btn.style.borderColor = '#b8cdd1';
      }
    }, 3000);
    return;
  }
  // Second click: actually delete
  deleteStock(id);
}

async function deleteStock(id) {
  stocks = stocks.filter(s => s.id !== id);
  await saveStocks();
  renderStockList();
  buildFilterBar();
  populateSelect();
}

async function addStock() {
  const brand = document.getElementById('newBrand').value.trim();
  const type  = document.getElementById('newType').value.trim();
  const gsm   = parseFloat(document.getElementById('newGsm').value);
  const thick = parseFloat(document.getElementById('newThickness').value);
  const coated = document.getElementById('newCoated').checked;
  if (!brand || !gsm || !thick) { alert('Please fill in Brand, GSM and Thickness.'); return; }
  stocks.push({ id: nextId++, brand, type, gsm, thickness: thick, coated });
  await saveStocks();
  document.getElementById('newBrand').value = '';
  document.getElementById('newType').value = '';
  document.getElementById('newGsm').value = '';
  document.getElementById('newThickness').value = '';
  document.getElementById('newCoated').checked = false;
  renderStockList();
  buildFilterBar();
  populateSelect();
}

// ─── INIT ─────────────────────────────────────────────────────────────
(async () => {
  await loadStocks();
  buildFilterBar();
  populateSelect();
})();
</script>
